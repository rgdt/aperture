name: Release

on:
  push:
    branches:
      - main

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      commit_sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(node scripts/bump-version.mjs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag release
        id: commit
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No version changes detected; aborting release."
            exit 1
          fi

          git add package.json
          git commit -m "chore: release ${TAG} [skip release]"
          git tag "${TAG}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "${TAG}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  docker-image:
    if: ${{ needs.prepare.result == 'success' }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      IMAGE: ghcr.io/${{ github.repository_owner }}/aperture-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          fetch-depth: 0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" |
          docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${IMAGE}:${VERSION} .
          docker tag ${IMAGE}:${VERSION} ${IMAGE}:latest
          docker push ${IMAGE}:${VERSION}
          docker push ${IMAGE}:latest

  release:
    if: ${{ needs.prepare.result == 'success' && needs.docker-image.result == 'success' }}
    needs:
      - prepare
      - docker-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}
          fetch-depth: 0

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "Apertúre v${VERSION}" \
            --generate-notes
